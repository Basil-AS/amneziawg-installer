name: Docs consistency

# Lightweight, fast checks for the classes of drift that slip past the
# shellcheck/test workflows (their paths cover only shell scripts): broken
# internal markdown anchors, version triple drift, stale OS matrix, changelog
# heading/reference mismatch. No build, no network, no bats.
on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - 'docs/**'
      - '.github/**'
      - 'install_amneziawg*.sh'
      - 'manage_amneziawg*.sh'
      - 'awg_common*.sh'
      # Сам checker: правка его логики обязана триггерить этот workflow, иначе
      # PR, ломающий проверку, не получит сигнала на review (preflight поймает
      # позже, но раньше = лучше).
      - 'scripts/check-docs-consistency.sh'
  pull_request:
    paths:
      - '**/*.md'
      - 'docs/**'
      - '.github/**'
      - 'install_amneziawg*.sh'
      - 'manage_amneziawg*.sh'
      - 'awg_common*.sh'
      - 'scripts/check-docs-consistency.sh'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-consistency:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run docs consistency checks
        run: bash scripts/check-docs-consistency.sh

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release $TAG already exists — skipping"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog for this version
        if: steps.check.outputs.exists != 'true'
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          ESCAPED="${VERSION//./\\.}"

          FILE_VERSION="$(tr -d '\r\n' < VERSION)"
          if [[ "$FILE_VERSION" != "$VERSION" ]]; then
            echo "::error::Tag version ${VERSION} does not match VERSION file (${FILE_VERSION})"
            exit 1
          fi

          if ! grep -q "^## \\[${ESCAPED}\\]" CHANGELOG.en.md; then
            echo "::error::Version ${VERSION} not found in CHANGELOG.en.md"
            exit 1
          fi

          # Extract: from version header to next version header or end of file
          awk "/^## \\[${ESCAPED}\\]/{found=1; next} /^## \\[/{if(found) exit} found" CHANGELOG.en.md > /tmp/release-notes.md

          echo "--- Release notes preview ---"
          cat /tmp/release-notes.md

      - name: Build deterministic safe-update bundle
        if: steps.check.outputs.exists != 'true'
        run: |
          VERSION="$(tr -d '\r\n' < VERSION)"
          ASSET="/tmp/amneziawg-update-${VERSION}.tar.gz"
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner \
            -czf "$ASSET" \
            VERSION \
            install_amneziawg.sh install_amneziawg_en.sh \
            awg_common.sh awg_common_en.sh \
            manage_amneziawg.sh manage_amneziawg_en.sh \
            scripts/update-installed.sh scripts/migrate-tunnel-subnet.sh scripts/update_geoip_dbs.py \
            web/server.py web/index.html web/style.css web/app.js web/awg_i1.js web/favicon.svg \
            web/vendor/tailwindcss.js web/vendor/apexcharts.min.js
          cd /tmp
          sha256sum "$(basename "$ASSET")" > "$(basename "$ASSET").sha256"
          install -m 755 "$GITHUB_WORKSPACE/scripts/update-installed.sh" /tmp/update-installed.sh
          sha256sum update-installed.sh > update-installed.sh.sha256

      - name: Create Release
        if: steps.check.outputs.exists != 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body_path: /tmp/release-notes.md
          files: |
            /tmp/amneziawg-update-*.tar.gz
            /tmp/amneziawg-update-*.tar.gz.sha256
            /tmp/update-installed.sh
            /tmp/update-installed.sh.sha256
          draft: false
          prerelease: false

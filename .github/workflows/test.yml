name: Tests

on:
  push:
    branches: [main]
    paths: ['*.sh', 'scripts/**', 'tests/**', 'web/**']
  pull_request:
    paths: ['*.sh', 'scripts/**', 'tests/**', 'web/**']

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run unit tests
        run: bats tests/*.bats

      - name: Diagnose failed Bats file
        if: ${{ failure() }}
        shell: bash
        run: |
          set +e
          for test_file in tests/*.bats; do
            output="$(timeout 45s bats "$test_file" 2>&1)"
            rc=$?
            if [[ "$rc" -ne 0 ]]; then
              summary="$(printf '%s' "$output" | tail -n 12 | tr '\n' ' ' | cut -c1-900)"
              echo "::error file=${test_file},title=Bats failure::exit=${rc} ${summary}"
            fi
          done

      - name: Compile web panel server
        run: python3 -m py_compile web/server.py

      - name: Check frontend JavaScript syntax
        run: |
          node --check web/app.js
          node --check web/awg_i1.js

      - name: Verify installer SHA manifest freshness
        run: |
          bash scripts/update-installer-sha-manifest.sh
          git diff --exit-code -- install_amneziawg.sh install_amneziawg_en.sh || {
            echo "Installer SHA manifest is stale. Run: rtk bash scripts/update-installer-sha-manifest.sh" >&2
            exit 1
          }
